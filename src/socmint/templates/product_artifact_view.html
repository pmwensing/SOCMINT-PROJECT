<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ artifact.name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e5e7eb; }
    main { max-width: 1180px; margin: 0 auto; padding: 28px; }
    a { color: #93c5fd; }
    pre { white-space: pre-wrap; background: #020617; border: 1px solid #334155; border-radius: 14px; padding: 16px; overflow: auto; color: #bfdbfe; }
    .muted { color: #94a3b8; }
  </style>
</head>
<body>
<main>
  <h1>{{ artifact.name }}</h1>
  <p class="muted">{{ artifact.kind }} | {{ artifact.path }}</p>
  <p>
    <a href="{{ url_for('dashboard.product_artifacts_view') }}">Back to artifacts</a>
    |
    <a href="/product/artifacts/download/{{ artifact.path }}">Download</a>
  </p>
  <pre>{{ content }}</pre>
</main>
</body>
</html>
