name: SOCMINT Full Verification

on:
  workflow_dispatch:
  push:
    branches:
      - feat/v11.0-command-center
      - feat/v12.0-full-dossier-production-gate
  pull_request:

jobs:
  full-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare compose environment
        run: |
          cp .env.example .env
          python - <<'PY'
          from pathlib import Path

          p = Path(".env")
          s = p.read_text()
          replacements = {
              "SOCMINT_ADMIN_PASSWORD=replace-with-a-strong-admin-password": "SOCMINT_ADMIN_PASSWORD=CI-FullVerify-Admin-2026!",
              "SOCMINT_SECRET_KEY=replace-with-a-long-random-secret": "SOCMINT_SECRET_KEY=ci-full-verification-secret-key-2026-not-a-placeholder",
              "SOCMINT_BACKUP_PASSPHRASE=replace-with-a-long-backup-passphrase": "SOCMINT_BACKUP_PASSPHRASE=CI-FullVerify-Backup-2026!",
              "SOCMINT_SIGNUP_INVITE_CODE=replace-with-a-private-invite-code": "SOCMINT_SIGNUP_INVITE_CODE=ci-full-verification-invite-2026",
          }
          for before, after in replacements.items():
              s = s.replace(before, after)
          p.write_text(s)
          PY

      - name: Build SOCMINT runtime
        run: |
          docker compose build --no-cache --build-arg SOCMINT_INSTALL_CONNECTORS=true app worker

      - name: Launch services
        env:
          SOCMINT_INSTALL_CONNECTORS: "true"
          SOCMINT_APP_CONNECTOR_MODE: diagnostic
          SOCMINT_WORKER_CONNECTOR_MODE: diagnostic
          SOCMINT_AUTHORIZED_REALWORLD_CONNECTORS: "false"
          GUNICORN_TIMEOUT: "180"
        run: |
          set -euo pipefail

          echo "[+] Start tor and app"
          docker compose up -d tor
          docker compose up -d app

          echo "[+] Wait for app /readyz"
          ready=0
          for i in $(seq 1 36); do
            echo "[+] readiness attempt ${i}/36"
            docker compose ps
            if docker compose exec -T app python -c 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:5000/readyz", timeout=5).read(); print("ready")'
            then
              ready=1
              break
            fi
            docker compose logs --no-color --tail=80 app || true
            sleep 5
          done

          if [ "$ready" != "1" ]; then
            echo "[!] app did not become ready"
            docker compose ps || true
            docker compose logs --no-color --tail=300 app tor worker || true
            docker inspect socmint-project-app-1 || true
            exit 1
          fi

          echo "[+] Start worker without re-evaluating app depends_on gate"
          docker compose --profile worker up -d --no-deps worker
          docker compose ps

      - name: Dump compose diagnostics
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color --tail=300 app tor worker || true
          docker inspect socmint-project-app-1 || true

      - name: Run full verification harness
        run: |
          make test-all-socmint | tee SOCMINT_FULL_AUDIT.log

      - name: Archive verification artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: socmint-full-audit
          path: |
            SOCMINT_FULL_AUDIT.log
            var/socmint/audits/**
            var/socmint/dossiers/**
