name: SOCMINT v12.10.18 Verify

on:
  pull_request:
    branches: [master]
  push:
    branches: [master, 'feat/**']
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
      - name: Run route gate
        env:
          SOCMINT_SECRET_KEY: test-v12-10-18-ci-secret-key-000000000000000000000
          SOCMINT_AUTO_CREATE_DB: 'true'
          DATABASE_URL: sqlite:///var/test_v12_10_18_ci.db
        run: python scripts/runtime_route_release_gate_v12_10_18.py
      - name: Run smoke script
        env:
          SOCMINT_SECRET_KEY: test-v12-10-18-ci-secret-key-000000000000000000000
          SOCMINT_AUTO_CREATE_DB: 'true'
          DATABASE_URL: sqlite:///var/test_v12_10_18_ci.db
          SOCMINT_BASE_URL: ''
        run: python scripts/live_release_status_smoke_v12_10_18.py
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: socmint-v12-10-18-verify-${{ github.run_id }}
          path: |
            var/socmint/rc_reports/*.json
            var/socmint/rc_reports/*.md
          if-no-files-found: warn
          retention-days: 30
