name: SOCMINT v12.10.19 Verify

on:
  pull_request:
    branches: [master]
  push:
    branches: [master, 'feat/**']
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
      - name: Start app for runtime readiness
        env:
          SOCMINT_SECRET_KEY: test-v12-10-19-ci-secret-key-000000000000000000000
          SOCMINT_AUTO_CREATE_DB: 'true'
          DATABASE_URL: sqlite:///var/test_v12_10_19_ci.db
          SOCMINT_DATA_DIR: var/test_v12_10_19_data
          SOCMINT_DOCKER_TOR: 'true'
          SOCMINT_LOCAL_BASE_URL: http://127.0.0.1:5000
        run: |
          mkdir -p var/test_v12_10_19_data var/socmint/rc_reports
          python -m gunicorn --bind 127.0.0.1:5000 src.socmint.wsgi:app > var/socmint/rc_reports/runtime.log 2>&1 &
          echo $! > var/socmint/rc_reports/runtime.pid
          for i in $(seq 1 30); do
            if python -c 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:5000/readyz", timeout=2)'
            then
              exit 0
            fi
            sleep 1
          done
          cat var/socmint/rc_reports/runtime.log || true
          exit 1
      - name: Run dashboard decision gate
        env:
          SOCMINT_SECRET_KEY: test-v12-10-19-ci-secret-key-000000000000000000000
          SOCMINT_AUTO_CREATE_DB: 'true'
          DATABASE_URL: sqlite:///var/test_v12_10_19_ci.db
          SOCMINT_DATA_DIR: var/test_v12_10_19_data
          SOCMINT_DOCKER_TOR: 'true'
          SOCMINT_LOCAL_BASE_URL: http://127.0.0.1:5000
          SOCMINT_RELEASE_DASHBOARD_SEED_PASS_REPORT: 'true'
        run: python scripts/release_dashboard_decision_gate_v12_10_19.py
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: socmint-v12-10-19-verify-${{ github.run_id }}
          path: |
            var/socmint/rc_reports/*.json
            var/socmint/rc_reports/*.md
            var/socmint/rc_reports/*.log
          if-no-files-found: warn
          retention-days: 30
