name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      docker_smoke:
        description: "Run the Docker/Tor production deployment rehearsal"
        required: false
        default: "false"
      upload_runtime_screenshots:
        description: "Upload runtime screenshot artifacts when a manual screenshot workflow has produced them"
        required: false
        default: "false"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: |
          mkdir -p var/socmint/ci_reports
          ruff check src tests scripts --output-format=full > var/socmint/ci_reports/ruff.log

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: socmint-ci-lint-${{ github.run_id }}
          path: var/socmint/ci_reports/ruff.log
          if-no-files-found: warn
          retention-days: 30

      - name: Test
        run: |
          set +e
          set -o pipefail
          pytest -q --junitxml=/tmp/pytest.xml 2>&1 | tee /tmp/pytest.out
          status=$?
          if [ "$status" -ne 0 ]; then
            python scripts/annotate_ci_output.py /tmp/pytest.out /tmp/pytest.xml
          fi
          exit "$status"

      - name: v31 publication browser E2E
        env:
          SOCMINT_SECRET_KEY: ci-v31-browser-e2e-secret-key-000000000000000000
          SOCMINT_AUTO_CREATE_DB: "true"
        run: |
          python scripts/run_v31_7_publication_browser_e2e.py --json

      - name: Command Center export gate verification
        run: |
          pytest -q tests/test_command_center_export_gate_v13_40.py tests/test_export_blocker_routes_v13_39.py

      - name: Docker Compose config
        env:
          SOCMINT_ENV_FILE: .env.example
        run: |
          docker compose --env-file .env.example config
          docker compose --env-file .env.example --profile postgres config

      - name: Alembic migration smoke
        env:
          DATABASE_URL: sqlite:////tmp/socmint-ci/socmint.db
          SOCMINT_DATA_DIR: /tmp/socmint-ci
          SOCMINT_AUTO_CREATE_DB: "false"
        run: |
          rm -rf /tmp/socmint-ci
          mkdir -p /tmp/socmint-ci
          alembic upgrade head

      - name: Backup restore smoke
        run: python scripts/backup_restore_smoke.py

      - name: Production boot smoke
        run: python scripts/production_boot_check.py

      - name: Dependency audit
        run: pip-audit -r requirements.lock

      - name: Upload runtime screenshots
        if: github.event_name == 'workflow_dispatch' && inputs.upload_runtime_screenshots == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: socmint-runtime-screenshots-v13-40-${{ github.run_id }}
          path: |
            runtime_screenshots_v13_40/**
            release/V13_42_EXPORT_BLOCKER_SCREENSHOT_ARTIFACT_MANIFEST.json
          if-no-files-found: warn
          retention-days: 30

  postgres-concurrency:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: socmint
          POSTGRES_PASSWORD: socmint
          POSTGRES_DB: socmint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U socmint -d socmint_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://socmint:socmint@localhost:5432/socmint_test
      SOCMINT_POSTGRES_TEST_URL: postgresql+psycopg://socmint:socmint@localhost:5432/socmint_test
      SOCMINT_AUTO_CREATE_DB: "false"
      SOCMINT_SECRET_KEY: ci-v35-3-postgres-concurrency-secret-key-000000000000
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Upgrade PostgreSQL schema
        run: alembic upgrade head

      - name: Run v35.3 PostgreSQL concurrency tests
        run: pytest -q tests/test_v35_3_postgres_concurrency.py

  docker-smoke:
    if: github.event_name == 'workflow_dispatch' && inputs.docker_smoke == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install production dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-prod.txt

      - name: Docker production deployment rehearsal
        run: python scripts/production_docker_smoke.py
