name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src tests scripts

      - name: Test
        run: |
          set +e
          pytest -q --junitxml=/tmp/pytest.xml
          status=$?
          if [ "$status" -ne 0 ]; then
            python - <<'PY'
          import xml.etree.ElementTree as ET

          def escape(value):
              return str(value or "").replace("%", "%25").replace("\n", "%0A").replace("\r", "%0D")

          root = ET.parse("/tmp/pytest.xml").getroot()
          for case in root.iter("testcase"):
              problem = case.find("failure") or case.find("error")
              if problem is None:
                  continue
              name = f"{case.get('classname')}.{case.get('name')}"
              path = case.get("file") or ".github"
              line = case.get("line") or "1"
              message = problem.get("message") or problem.text or "pytest failure"
              print(f"::error file={path},line={line},title={escape(name)}::{escape(message)}")
          PY
          fi
          exit "$status"

      - name: Docker Compose config
        env:
          SOCMINT_ENV_FILE: .env.example
        run: |
          docker compose --env-file .env.example config
          docker compose --env-file .env.example --profile postgres config

      - name: Alembic migration smoke
        env:
          DATABASE_URL: sqlite:////tmp/socmint-ci/socmint.db
          SOCMINT_DATA_DIR: /tmp/socmint-ci
          SOCMINT_AUTO_CREATE_DB: "false"
        run: |
          rm -rf /tmp/socmint-ci
          mkdir -p /tmp/socmint-ci
          alembic upgrade head

      - name: Backup restore smoke
        run: python scripts/backup_restore_smoke.py

      - name: Production boot smoke
        run: python scripts/production_boot_check.py

      - name: Dependency audit
        run: pip-audit -r requirements.lock
