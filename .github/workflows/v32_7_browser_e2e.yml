name: SOCMINT v32.7 through v35.4 Browser E2E

on:
  pull_request:
    paths:
      - "src/socmint/*v32*.py"
      - "src/socmint/*v33*.py"
      - "src/socmint/*v34*.py"
      - "src/socmint/*v35*.py"
      - "src/socmint/templates/*v32*.html"
      - "src/socmint/templates/*v33*.html"
      - "src/socmint/templates/*v34*.html"
      - "src/socmint/templates/*v35*.html"
      - "src/socmint/templates/base.html"
      - "scripts/run_v32_7_dissemination_browser_e2e.py"
      - "scripts/run_v33_7_case_governance_browser_e2e.py"
      - "scripts/run_v34_7_governance_execution_browser_e2e.py"
      - "scripts/run_v35_4_execution_reconciliation_browser_e2e.py"
      - "tests/test_v32*.py"
      - "tests/test_v33*.py"
      - "tests/test_v34*.py"
      - "tests/test_v35*.py"
      - "release/V32*.md"
      - "release/V32*.json"
      - "release/V33*.md"
      - "release/V33*.json"
      - "release/V34*.md"
      - "release/V34*.json"
      - "release/V35*.md"
      - "release/V35*.json"
      - ".github/workflows/v32_7_browser_e2e.yml"
  workflow_dispatch:

jobs:
  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -r requirements-dev.txt --quiet

      - name: Run focused v32 through v35 tests
        run: |
          set -o pipefail
          pytest -q tests/test_v32*.py tests/test_v33*.py tests/test_v34*.py tests/test_v35*.py --tb=short -ra 2>&1 | tee /tmp/v32-v35-focused.log

      - name: Upload focused test diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: v32-v35-focused-test-diagnostics-${{ github.run_id }}
          path: /tmp/v32-v35-focused.log
          if-no-files-found: error
          retention-days: 7

      - name: Run v32 browser E2E
        run: python scripts/run_v32_7_dissemination_browser_e2e.py --json

      - name: Run v33 browser E2E
        run: python scripts/run_v33_7_case_governance_browser_e2e.py

      - name: Run v34 browser E2E
        run: python scripts/run_v34_7_governance_execution_browser_e2e.py

      - name: Run v35.4 browser E2E
        run: python scripts/run_v35_4_execution_reconciliation_browser_e2e.py
