name: SOCMINT v32.7 Browser E2E

on:
  pull_request:
    paths:
      - "src/socmint/*v32*.py"
      - "src/socmint/templates/*v32*.html"
      - "scripts/run_v32_7_dissemination_browser_e2e.py"
      - "tests/test_v32*.py"
      - "release/V32*.md"
      - "release/V32*.json"
      - ".github/workflows/v32_7_browser_e2e.yml"
  workflow_dispatch:

jobs:
  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run focused v32 tests
        run: pytest -q tests/test_v32*.py

      - name: Run v32 browser E2E
        run: python scripts/run_v32_7_dissemination_browser_e2e.py --json
